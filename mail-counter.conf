# =============================================================================
# Mail Counter - Configuration
# =============================================================================
# This file is sourced as shell variables by mail-counter.sh
# After editing, restart the service: systemctl restart mail-counter
# =============================================================================

# --- Webhook ---
WEBHOOK_URL="https://mail.thc.org/api/counter/increment?key={SECRET}"

# --- Telegram ---
TELEGRAM_ENABLED="false"
TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""

# --- Email (via swaks) ---
SMTP_ENABLED="false"
SMTP_TO=""
SMTP_FROM=""
SMTP_SERVER="localhost"
SMTP_PORT="587"
SMTP_USER=""
SMTP_PASSWORD=""
SMTP_TLS="true"

# --- Webhook retry ---
CURL_MAX_RETRIES=5
CURL_INITIAL_BACKOFF=2
CURL_MAX_BACKOFF=60

# --- Notification queue ---
QUEUE_RETRY_INTERVAL=300
QUEUE_RETRY_DELAY=5
QUEUE_MAX_RETRIES=48

# --- Paths (generally don't change) ---
STATE_DIR="/var/lib/mail-counter"
CURSOR_FILE="${STATE_DIR}/cursor"
FIRST_RUN_FILE="${STATE_DIR}/first-run-done"
QUEUE_DIR="${STATE_DIR}/queue"
LOG_TAG="mail-counter"

# --- Postfix journal unit pattern ---
POSTFIX_UNIT="postfix*"
